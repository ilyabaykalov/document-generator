<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Генератор открыток</title>
	<link rel='stylesheet' href='./style.css'>
    <link type="Image/x-icon" href="templates/2023/assets/favicon.ico" rel="icon">
</head>
<body>
    <div class="wrapper">
        <form id='postcard-form'>
            <div class='input-block'>
                <label for='full_name' class='required'>Кому открытка (в род. падеже)?</label>
                <input type='text' id='full_name' name='full_name' oninput="validateFullName(event)" placeholder='Байкалову Илье Сергеевичу'>
            </div>
            <span id="full_name-error">Некорректное значение</span>

            <div class='input-block'>
                <label for='title' class='required'>Уважаемый(-ая)...</label>
                <input type='text' id='title' name='title' oninput="validateTitle(event)" placeholder='Уважаемый Илья Сергеевич!'>
            </div>
            <span id="title-error">Некорректное значение</span>

            <div class='input-block'>
                <label for='text_1' class='required'>Что-то еще написать</label>
                <input type='text' id='text_1' name='text_1' placeholder='Примите мои самые искренние поздравления с 26-летием!'>
            </div>

            <div class='input-block'>
                <label for='text_2' class='required'>Что-то еще написать</label>
                <textarea id='text_2' name='text_2' placeholder='От всей души желаю Вам здоровья, счастья, удачи и радости! Пусть всегда рядом будет всесторонняя поддержка родных, близких и друзей, а богатый жизненный опыт, оптимизм и житейская мудрость помогают Вам уверенно идти вперед!'></textarea>
            </div>

            <div class='input-block'>
                <label for='text_3'>Что-то еще написать</label>
                <textarea id='text_3' name='text_3' placeholder='Ваша целеустремленность, упорство и желание достигать новых высот - те качества, которые сопровождают Вас не только на профессиональной сфере, но и по жизни. Мы гордится таким замечательным человеком!'></textarea>
            </div>

            <div class='input-block'>
                <label for='text_4'>Что-то еще написать</label>
                <textarea id='text_4' name='text_4' placeholder='Благодарю Вас за высокий профессионализм, нацеленность на достижение результата и ответственный подход к своему делу!'></textarea>
            </div>

            <div class='input-block'>
                <label for='date' class='required'>г. Москва, (просто выбери дату)</label>
                <input type='date' id='date' name='date'>
            </div>

            <div class='input-block'>
                <label for='isWebVersion'>Нужна электронная версия</label>
                <input type='checkbox' id='isWebVersion' name='isWebVersion' checked>
            </div>

            <div class='button-block'>
                <button onclick='buildPostcardData(event)'>Сгенерировать открытку</button>
            </div>
        </form>
        <div class="templates">
            <p>Шаблоны:</p>
            <label for="year"> Выбери год дизайна
                <select name="year" id="year">
                    <option value="2023">2023 год</option>
                    <option value="2024" selected>2024 год</option>
                </select>
            </label>
            <button onclick="loadData('birthday')">День рождения</button>
            <hr>
            <button onclick="loadData()">Загрузить последние данные</button>
            <button onclick="resetForm()">Очистить поля</button>
            <hr>
            <p>Настройки PDF:</p>
            <label for="format"> Выбери формат
                <select name="format" id="format">
                    <option value="a4">A4</option>
                    <option value="a5" selected>A5</option>
                </select>
            </label>
            <label for="orientation"> Выбери ориентацию
                <select name="orientation" id="orientation">
                    <option value="portrait">Портретная</option>
                    <option value="landscape">Альбомная</option>
                </select>
            </label>
        </div>
    </div>
	<script src='./generator.js'></script>
</body>
</html>
